<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0" stop-color="#06b6d4" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <style>
      .bg { fill: #0f172a; }
      .card { fill: url(#g2); opacity: 0.08; }
      .title { fill: #e6eef8; font-family: Inter, sans-serif; font-weight: 700; font-size: 36px; }
      .sub { fill: #9aa7bd; font-family: Inter, sans-serif; font-size: 18px; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="600" rx="24"/>
  <rect class="card" x="60" y="60" width="1080" height="420" rx="18"/>
  <g transform="translate(80,100)">
    <rect x="40" y="40" rx="16" width="200" height="140" fill="#1f2937" opacity="0.6" />
    <rect x="260" y="40" rx="12" width="720" height="220" fill="#071326" opacity="0.65" />
    <text x="260" y="90" class="title">Hotel Booking System</text>
    <text x="260" y="130" class="sub">Room inventory, bookings, payments, admin dashboard</text>
  </g>
